# --- sane defaults ---
set -g mouse on                       # click panes/windows, scroll, resize
set -g base-index 1                   # windows start at 1, not 0
setw -g pane-base-index 1             # panes start at 1
set -g renumber-windows on            # keep window numbers gapless
set -g history-limit 10000            # bigger scrollback
set -sg escape-time 10                # fix esc delay (matters in nvim)
set -g focus-events on                # helps nvim autoread
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor

# --- prefix: Ctrl-b is fine, but many prefer Ctrl-a ---
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# --- friendlier splits (and open in current dir) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- status bar: chrome-style tabs on top ---
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=white"

# left: session name  |  right: clock (set both to "" for pure tabs)
set -g status-left "#[bold] #S "
set -g status-left-length 20
set -g status-right " %H:%M "

# inactive tab (needs a Nerd Font for the  rounded ends)
setw -g window-status-format "#[fg=colour240]#[fg=colour250,bg=colour240] #I:#W #[fg=colour240,bg=default]"

# active tab — the focused "chrome tab"
setw -g window-status-current-format "#[fg=colour39]#[fg=black,bg=colour39,bold] #I:#W #[fg=colour39,bg=default]"

# gap between tabs
setw -g window-status-separator " "

# --- seamless nvim <-> tmux pane navigation ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '(^|/)g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

